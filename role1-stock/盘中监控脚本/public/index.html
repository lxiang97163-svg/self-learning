<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盯盘仪表盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080d14;
      --surface:   #0f1623;
      --surface2:  #151d2b;
      --border:    #1c2636;
      --border2:   #2a3a50;
      --text:      #e0e8f4;
      --text2:     #94a3b8;
      --muted:     #5a6f85;
      --dim:       #2e3f54;

      --green:     #1fd97e;
      --green-bg:  #042315;
      --green-bd:  #0f6b3a;
      --red:       #f05252;
      --red-bg:    #280b0b;
      --red-bd:    #7a1e1e;
      --amber:     #f5a623;
      --amber-bg:  #3a1f04;
      --amber-bd:  #8a5010;
      --blue:      #4fa3f7;
      --blue-bg:   #061a32;
      --blue-bd:   #1a4580;
      --violet:    #a78bfa;
      --violet-bg: #1a0f38;
      --violet-bd: #4c2888;
      --cyan:      #22d3ee;
      --cyan-bg:   #051e28;
      --cyan-bd:   #0f6880;

      --fw: 1380px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ══ 顶部主导航 ════════════════════════════════════════════ */
    .topbar {
      position: sticky; top: 0; z-index: 300;
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      height: 54px;
      display: flex; align-items: center; gap: 0;
      padding: 0;
    }
    .tb-logo {
      flex-shrink: 0;
      padding: 0 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 700;
      color: var(--amber);
      letter-spacing: 0.06em;
      border-right: 1px solid var(--border2);
      height: 100%; display: flex; align-items: center; gap: 8px;
    }
    .tb-logo-dot { width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.85)} }

    /* Tab 切换 */
    .tab-nav {
      display: flex; height: 100%; margin: 0 4px;
    }
    .tab-btn {
      position: relative;
      height: 100%; padding: 0 22px;
      background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--muted);
      transition: color 0.2s;
      display: flex; align-items: center; gap: 7px;
    }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active {
      color: var(--text);
      font-weight: 700;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute; bottom: 0; left: 14px; right: 14px; height: 2px;
      background: var(--amber); border-radius: 2px 2px 0 0;
    }
    .tab-icon { font-size: 15px; }

    .tb-spacer { flex: 1; }

    /* 日期选择器 */
    .date-picker-wrap {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px;
      border-left: 1px solid var(--border2);
      height: 100%;
    }
    .date-label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    #date-select {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border2); border-radius: 6px;
      padding: 5px 10px; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; cursor: pointer; outline: none;
      transition: border-color 0.2s;
    }
    #date-select:hover, #date-select:focus { border-color: var(--amber); }

    /* Live 指示器 */
    .live-wrap {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px;
      border-left: 1px solid var(--border2);
      height: 100%;
      font-size: 11px; color: var(--muted);
    }
    .live-dot { width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background 0.3s; }
    .live-dot.live  { background:var(--green); animation:livepulse 1.5s ease-in-out infinite; }
    .live-dot.stale { background:var(--amber); }
    .live-dot.error { background:var(--red); }
    .live-dot.historical { background:var(--muted); animation:none; }
    @keyframes livepulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    .live-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; }
    .live-label.live  { color:var(--green); }
    .live-label.stale { color:var(--amber); }
    .live-label.error { color:var(--red); }
    .live-label.historical { color:var(--muted); }
    .live-age { font-size: 10px; min-width: 50px; }

    /* 倒计时 */
    .countdown-wrap { display:none; align-items:center;gap:6px;padding:0 12px;font-size:11px;color:var(--muted); }
    .countdown-wrap.show { display:flex; }
    .countdown-num { font-size:14px;font-weight:700;color:var(--text);min-width:22px;text-align:right; }
    .cd-low { color:var(--amber)!important; }

    /* ══ 内容层 ════════════════════════════════════════════════ */
    .content-wrap {
      max-width: var(--fw);
      margin: 0 auto;
      padding: 0 24px;
    }

    .tab-panel { display: none; padding-top: 18px; }
    .tab-panel.active { display: block; }

    /* ══ 通用卡片 ═══════════════════════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .card.health-pass { border-color:var(--green-bd); box-shadow:0 0 0 1px rgba(31,217,126,0.25),0 0 20px rgba(31,217,126,0.1); }
    .card.health-warn { border-color:var(--amber-bd); box-shadow:0 0 0 1px rgba(245,166,35,0.2); }
    .card.health-fail { border-color:var(--red-bd); }
    .card.card-blue   { border-color:var(--blue-bd); }
    .card.card-violet { border-color:var(--violet-bd); }

    .card-head {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .card-head-badge {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em;
      padding: 2px 7px; border-radius: 3px;
      background: var(--bg); color: var(--muted); border: 1px solid var(--border2);
    }
    .card-head-title { font-size: 13.5px; font-weight: 700; color: #f1f5f9; }
    .head-spacer { flex: 1; }

    /* ── 健康度徽章 */
    .hbadge { display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid transparent; }
    .hbadge-pass { background:var(--green-bg);color:var(--green);border-color:var(--green-bd); }
    .hbadge-warn { background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd); }
    .hbadge-fail { background:var(--red-bg);color:var(--red);border-color:var(--red-bd); }
    .hbadge-neu  { background:var(--bg);color:var(--muted);border-color:var(--border2); }

    /* ── 健康度条件行 */
    .health-row { display:flex;gap:5px;flex-wrap:wrap;padding:6px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.25); }
    .hc-item { display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 6px;border-radius:3px;white-space:nowrap; }
    .hc-pass { background:var(--green-bg);color:var(--green); }
    .hc-fail { background:var(--red-bg);color:var(--red); }
    .hc-nd   { background:var(--bg);color:var(--muted);border:1px solid var(--border2); }

    /* ══ 股票行（竞价监控用） ════════════════════════════════════ */
    .srow {
      display: grid; grid-template-columns: 165px 72px 1fr auto;
      gap: 6px; align-items: center;
      padding: 7px 16px; border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .srow:last-child { border-bottom: none; }
    .srow:hover { background: #111d2e; }
    .srow-sm { grid-template-columns: 140px 66px 1fr auto; padding: 5px 12px; }
    .s-label    { font-weight: 600; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-label-sm { font-size: 12px; color: #94a3b8; }
    .s-pct      { text-align: right; font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .pct-sealed { color: var(--amber); }
    .pct-ok     { color: var(--green); }
    .pct-watch  { color: #7c94b0; }
    .pct-drop   { color: var(--red); }
    .pct-nodata { color: var(--dim); }

    .sbadge { display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;border:1px solid transparent; }
    .sbadge-sealed { background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd); }
    .sbadge-ok     { background:var(--green-bg);color:var(--green);border-color:var(--green-bd); }
    .sbadge-watch  { background:var(--bg);color:#5a7090;border-color:var(--border2); }
    .sbadge-drop   { background:var(--red-bg);color:var(--red);border-color:var(--red-bd); }
    .sbadge-nodata { background:var(--bg);color:var(--dim);border-color:var(--border); }

    .abadge      { font-size:10px;white-space:nowrap;font-family:'JetBrains Mono',monospace; }
    .abadge-ok   { color:var(--green); }
    .abadge-fail { color:var(--red); }
    .abadge-neu  { color:var(--blue); }
    .abadge-none { color:var(--muted); }
    .abadge-prevonly { color:var(--muted); }
    .abadge-ratio { color:#a5b4fc;font-weight:600; }

    /* B 备选子卡 */
    .b-grid { display:grid;grid-template-columns:repeat(2,1fr); }
    .b-sub  { border-right:1px solid var(--border); }
    .b-sub:last-child { border-right:none; }
    .b-sub-head { padding:6px 12px;font-size:10px;font-weight:700;color:var(--violet);background:var(--violet-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap; }
    .b-switch-row { display:flex;gap:4px;flex-wrap:wrap;padding:4px 12px 5px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.12); }
    .sw-item { font-size:9.5px;padding:1px 5px;border-radius:3px;white-space:nowrap; }
    .sw-pass { background:var(--green-bg);color:var(--green); }
    .sw-fail { background:var(--red-bg);color:var(--red); }
    .sw-man  { background:var(--bg);color:var(--muted);border:1px solid var(--border2); }

    /* 低吸候选子卡 */
    .w-grid { display:grid;grid-template-columns:repeat(3,1fr); }
    .w-sub  { border-right:1px solid var(--border); }
    .w-sub:last-child { border-right:none; }
    .w-sub-head { padding:6px 12px;font-size:10px;font-weight:700;color:var(--blue);background:var(--blue-bg);border-bottom:1px solid var(--border); }

    /* ══ 布局工具 ════════════════════════════════════════════════ */
    .row2   { display:grid;grid-template-columns:1fr 1fr;gap:14px; }
    .row3   { display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px; }
    .gap14  { display:flex;flex-direction:column;gap:14px; }

    /* 区块标题 */
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      padding-bottom: 8px; margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* 状态/错误 */
    .state-msg { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 13px; }
    .state-msg .icon { font-size: 36px; display: block; margin-bottom: 12px; }
    .state-msg .hint { font-size: 11px; color: var(--dim); margin-top: 8px; }

    /* ── 底部状态栏 */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 30px; background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      padding: 0 24px; font-size: 10px; color: var(--muted);
      z-index: 200;
    }
    .footer-green { color: var(--green); }
    #f-updated { margin-left: auto; }

    /* 数据更新闪绿 */
    @keyframes flashGreen { 0%{background:#081d10} 100%{background:transparent} }
    .flash-anim { animation: flashGreen 0.4s ease-out; }

    /* ══ Tab1: 复盘 ════════════════════════════════════════════ */

    /* 指数大卡 */
    .idx-card {
      background: linear-gradient(135deg, #0f1a2e 0%, #0a1220 100%);
      border: 1px solid var(--border2); border-radius: 10px;
      padding: 16px 20px; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;
    }
    .idx-main { flex: 1; min-width: 200px; }
    .idx-date-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 4px; }
    .idx-form { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
    .idx-ohlc { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
    .idx-ohlc-item { display: flex; flex-direction: column; gap: 1px; }
    .idx-ohlc-label { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .idx-ohlc-val { font-size: 15px; font-weight: 700; color: var(--text); font-family:'JetBrains Mono',monospace; }
    .idx-ohlc-val.green { color: var(--green); }
    .idx-ohlc-val.red   { color: var(--red); }

    .idx-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; min-width: 200px; }
    .idx-meta-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
    .idx-meta-k { font-size: 9px; color: var(--muted); margin-bottom: 3px; letter-spacing: 0.05em; }
    .idx-meta-v { font-size: 12px; font-weight: 600; color: var(--text); }

    /* 情绪统计卡 */
    .emo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px 16px; }
    .emo-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; text-align: center; }
    .emo-val  { font-size: 22px; font-weight: 700; font-family:'JetBrains Mono',monospace; margin-bottom: 2px; }
    .emo-lbl  { font-size: 9.5px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .emo-val.green   { color: var(--green); }
    .emo-val.red     { color: var(--red); }
    .emo-val.amber   { color: var(--amber); }
    .emo-val.cyan    { color: var(--cyan); }

    /* 情绪日历条 */
    .cal-row { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; }
    .cal-item {
      flex-shrink: 0; min-width: 130px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px;
    }
    .cal-item.today { border-color: var(--amber-bd); background: var(--amber-bg); }
    .cal-date { font-size: 10px; color: var(--muted); font-family:'JetBrains Mono',monospace; margin-bottom: 3px; }
    .cal-state { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
    .cal-desc { font-size: 10.5px; color: var(--text2); line-height: 1.4; }
    .cal-trend { font-size: 16px; margin-top: 4px; }

    /* 热力条 */
    .heat-list { display: flex; flex-direction: column; gap: 6px; padding: 12px 16px; }
    .heat-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border);
    }
    .heat-name { flex: 1; font-size: 12.5px; font-weight: 600; }
    .heat-bar-wrap { width: 100px; height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
    .heat-bar { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .heat-num { font-family:'JetBrains Mono',monospace; font-size: 12px; font-weight: 700; min-width: 28px; text-align: right; }
    .heat-trend { font-size: 15px; min-width: 20px; text-align: center; }
    .heat-stage { font-size: 9.5px; padding: 1px 6px; border-radius: 3px; white-space: nowrap; }
    .stage-active   { background: rgba(31,217,126,0.12); color: var(--green); }
    .stage-cooling  { background: rgba(245,82,82,0.1); color: var(--red); }
    .stage-low      { background: rgba(79,163,247,0.1); color: var(--blue); }

    /* 板块复盘表格 */
    .sector-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .sector-table th { padding: 7px 12px; background: var(--surface2); color: var(--muted); font-size: 9.5px; letter-spacing: 0.06em; text-align: left; border-bottom: 1px solid var(--border2); }
    .sector-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .sector-table tr:last-child td { border-bottom: none; }
    .sector-table tr:hover td { background: #0d1926; }
    .stage-pill { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .pill-ferment { background:rgba(31,217,126,0.12);color:var(--green); }
    .pill-peak    { background:rgba(245,166,35,0.12);color:var(--amber); }
    .pill-decay   { background:rgba(240,82,82,0.1);color:var(--red); }
    .pill-other   { background:var(--bg);color:var(--muted);border:1px solid var(--border2); }

    /* 如果则执行 */
    .ifthen-list { display: flex; flex-direction: column; gap: 0; }
    .ifthen-row {
      display: grid; grid-template-columns: 1.2fr 1fr 0.8fr;
      gap: 10px; align-items: start;
      padding: 9px 16px; border-bottom: 1px solid var(--border);
    }
    .ifthen-row:last-child { border-bottom: none; }
    .ifthen-row:hover { background: #0d1926; }
    .ifthen-cond { font-size: 12px; color: var(--text); font-weight: 600; }
    .ifthen-action { font-size: 12px; color: var(--blue); }
    .ifthen-result { font-size: 11px; color: var(--text2); }
    .ifthen-head { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 10px; padding: 6px 16px; background: var(--surface2); border-bottom: 1px solid var(--border2); font-size: 9.5px; color: var(--muted); letter-spacing: 0.06em; }

    /* 四块打分 */
    .score-wrap { display: flex; align-items: center; gap: 20px; padding: 14px 18px; flex-wrap: wrap; }
    .score-total { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--amber); flex-shrink: 0; }
    .score-total-num { font-size: 26px; font-weight: 700; color: var(--amber); font-family:'JetBrains Mono',monospace; line-height: 1; }
    .score-total-lbl { font-size: 9px; color: var(--muted); }
    .score-sub-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; flex: 1; }
    .score-sub-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
    .score-sub-k { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .score-sub-bar { height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
    .score-sub-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .score-sub-v { font-size: 13px; font-weight: 700; font-family:'JetBrains Mono',monospace; color: var(--text); }

    /* 图表容器 */
    .chart-wrap { position: relative; padding: 14px 16px; }
    .chart-wrap canvas { max-height: 220px; }

    /* ══ Tab2: 预案（速查）═══════════════════════════════════════ */

    /* 第零步信号 */
    .step0-table { width: 100%; border-collapse: collapse; }
    .step0-table th { padding: 8px 14px; background: var(--surface2); color: var(--muted); font-size: 9.5px; letter-spacing: 0.06em; text-align: left; border-bottom: 1px solid var(--border2); }
    .step0-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 12px; }
    .step0-table tr:last-child td { border-bottom: none; }
    .step0-table tr:hover td { background: #0d1926; }
    .step0-signal { font-weight: 700; color: var(--text); }
    .step0-ok     { color: var(--green); font-size: 11.5px; }
    .step0-fail   { color: var(--red);   font-size: 11.5px; }

    /* 预案链条（静态模式复用竞价监控卡片） */
    .plan-stock-row {
      display: grid; grid-template-columns: 160px 1fr auto;
      gap: 10px; align-items: start;
      padding: 8px 16px; border-bottom: 1px solid var(--border);
    }
    .plan-stock-row:last-child { border-bottom: none; }
    .plan-stock-row:hover { background: #0d1926; }
    .plan-stock-name { font-weight: 700; color: var(--text); display: flex; flex-direction: column; gap: 2px; }
    .plan-stock-role { font-size: 10px; color: var(--violet); }
    .plan-stock-cond { font-size: 11.5px; color: var(--text2); line-height: 1.5; }
    .plan-stock-deny { font-size: 10.5px; color: var(--red); }

    /* 空仓条件卡 */
    .no-trade-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
    .no-trade-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 12px; background: var(--red-bg); border: 1px solid var(--red-bd); border-radius: 6px;
      font-size: 12px; color: #ffaaaa;
    }
    .no-trade-icon { flex-shrink: 0; font-size: 14px; }

    /* B候选卡（预案静态版） */
    .plan-b-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    .plan-b-card { background: var(--surface); border: 1px solid var(--violet-bd); border-radius: 8px; overflow: hidden; }
    .plan-b-head { padding: 8px 14px; background: var(--violet-bg); border-bottom: 1px solid var(--border); font-size: 11.5px; font-weight: 700; color: var(--violet); }
    .plan-b-switch { padding: 7px 14px; font-size: 11px; color: var(--text2); border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); line-height: 1.6; white-space: pre-wrap; }

    /* ══ Tab3: 竞价（现有监控） ══════════════════════════════════ */
    .auction-meta {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border2);
    }
    .auction-time { font-size: 28px; font-weight: 700; color: #f8fafc; font-family:'JetBrains Mono',monospace; min-width: 68px; }
    .auction-idx-item { display: flex; flex-direction: column; gap: 1px; }
    .auction-idx-label { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .auction-idx-val { font-size: 14px; font-weight: 700; }

    /* ══ 响应式 ═══════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .row2, .row3 { grid-template-columns: 1fr; }
      .emo-grid { grid-template-columns: repeat(2,1fr); }
      .plan-b-grid { grid-template-columns: 1fr; }
      .content-wrap { padding: 0 12px; }
    }
  </style>
</head>
<body>

<!-- ══ 顶部导航 ══════════════════════════════════════════════════ -->
<nav class="topbar">

<!-- ══ 内容区 ════════════════════════════════════════════════════ -->
<div class="content-wrap">

  <!-- ─────────────────── Tab1: 每日复盘 ─────────────────────── -->
  <div id="tab-review" class="tab-panel">
    <div id="review-content">
      <div class="state-msg"><span class="icon">📊</span>正在加载复盘数据…</div>
    </div>
  </div>

  <!-- ─────────────────── Tab2: 明日预案 ─────────────────────── -->
  <div id="tab-plan" class="tab-panel">
    <div id="plan-content">
      <div class="state-msg"><span class="icon">🎯</span>正在加载预案数据…</div>
    </div>
  </div>

  <!-- ─────────────────── Tab3: 竞价监控 ─────────────────────── -->
  <div id="tab-auction" class="tab-panel active">
    <div class="auction-meta">
      <span class="auction-time" id="hdr-time">--:--</span>
      <div style="width:1px;height:32px;background:var(--border2);"></div>
      <div class="auction-idx-item">
        <span class="auction-idx-label">上证指数</span>
        <span class="auction-idx-val val-neutral" id="hdr-sh">—</span>
      </div>
      <div class="auction-idx-item">
        <span class="auction-idx-label">关键支撑</span>
        <span class="auction-idx-val" id="hdr-ks">—</span>
      </div>
    </div>
    <div id="auction-main" style="margin-top:14px;">
      <div class="state-msg">
        <span class="icon">⏳</span>正在连接数据流…
        <div class="hint">请确保 speedcard_monitor.py 已在运行（--test 模式也可）</div>
      </div>

</div><!-- /content-wrap -->

<!-- ══ 底部状态栏 ════════════════════════════════════════════════ -->
<footer class="footer">
  <span class="footer-green">●</span>
  <span>腾讯行情 + Tushare 竞价快照</span>
  <span>│</span>
  <span id="f-mode">SSE 实时流</span>
  <span id="f-stale"></span>
  <span id="f-updated" style="margin-left:auto">尚未更新</span>
</footer>

<script>
// ══════════════════════════════════════════════════════════════════
// 状态
// ══════════════════════════════════════════════════════════════════
let currentTab  = 'auction';
let currentDate = '';
let reviewCache = {};   // date → parsed review JSON
let planCache   = {};   // date → parsed plan JSON
/** 为 true 时只看某日 dashboard_YYYYMMDD.json，不接受 SSE/轮询覆盖 */
let auctionHistorical = false;
let auctionChart = null;  // Chart.js 热力小图
let calChart     = null;

// ══════════════════════════════════════════════════════════════════
// Tab 切换
// ══════════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tab}`));
  if (tab === 'review' && currentDate) loadReview(currentDate);
  if (tab === 'plan'   && currentDate) loadPlan(currentDate);
  if (tab === 'auction' && currentDate) syncAuctionViewForDate(currentDate);
}

// ══════════════════════════════════════════════════════════════════
// 日期选择器
// ══════════════════════════════════════════════════════════════════
async function loadDates() {
  try {
    const r = await fetch('/api/dates');
    const { dates } = await r.json();
    const sel = document.getElementById('date-select');
    sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
    if (dates.length) {
      currentDate = dates[0];
      sel.value = currentDate;
    }
  } catch(e) {
    document.getElementById('date-select').innerHTML = '<option>加载失败</option>';
  }
}

/** 浏览器本地日历日 YYYY-MM-DD（与速查/快照文件名一致，避免 UTC 偏差） */
function localTodayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function onDateChange(date) {
  currentDate = date;
  reviewCache = {};
  planCache   = {};
  if (currentTab === 'review') loadReview(date);
  if (currentTab === 'plan')   loadPlan(date);
  if (currentTab === 'auction') syncAuctionViewForDate(date);
}

// ══════════════════════════════════════════════════════════════════
// Tab1: 复盘渲染
// ══════════════════════════════════════════════════════════════════
async function loadReview(date) {
  const el = document.getElementById('review-content');
  if (reviewCache[date]) { el.innerHTML = reviewCache[date]; rebuildCharts(); return; }
  el.innerHTML = '<div class="state-msg"><span class="icon">📊</span>加载复盘中…</div>';
  try {
    const r = await fetch(`/api/review?date=${date}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const html = buildReviewHtml(d);
    el.innerHTML = html;
    reviewCache[date] = html;
    rebuildCharts();
  } catch(e) {
    el.innerHTML = `<div class="state-msg"><span class="icon">⚠</span>加载失败：${e.message}<div class="hint">确认复盘文件存在于 outputs/review/</div></div>`;
  }
}

function buildReviewHtml(d) {
  const r = d;
  let h = '';

  // ── 行1：指数大卡 + 情绪统计
  h += '<div class="row2" style="margin-bottom:14px;">';

  // 指数卡
  h += `<div class="idx-card">
    <div class="idx-main">
      <div class="idx-date-label">📅 ${r.review_date || r.date} · 指数复盘</div>`;

  const idx = r.idx || {};
  // 解析 OHLC
  const ohlcRaw = idx['昨日K线/形态'] || idx['昨日K线形态'] || '';
  const oMat = ohlcRaw.match(/开([\d.]+)/);
  const hMat = ohlcRaw.match(/高([\d.]+)/);
  const lMat = ohlcRaw.match(/低([\d.]+)/);
  const cMat = ohlcRaw.match(/收([\d.]+)/);
  const pctMat = ohlcRaw.match(/([+-][\d.]+%)/);
  const isUp = pctMat && pctMat[1].startsWith('+');

  if (oMat || cMat) {
    h += `<div class="idx-ohlc">`;
    if (oMat) h += `<div class="idx-ohlc-item"><div class="idx-ohlc-label">开</div><div class="idx-ohlc-val">${oMat[1]}</div></div>`;
    if (hMat) h += `<div class="idx-ohlc-item"><div class="idx-ohlc-label">高</div><div class="idx-ohlc-val green">${hMat[1]}</div></div>`;
    if (lMat) h += `<div class="idx-ohlc-item"><div class="idx-ohlc-label">低</div><div class="idx-ohlc-val red">${lMat[1]}</div></div>`;
    if (cMat) h += `<div class="idx-ohlc-item"><div class="idx-ohlc-label">收</div><div class="idx-ohlc-val ${isUp?'green':'red'}">${cMat[1]}${pctMat?` <span style="font-size:11px">${pctMat[1]}</span>`:''}</div></div>`;
    h += `</div>`;
  } else {
    h += `<div class="idx-form" style="margin-bottom:10px">${ohlcRaw || '—'}</div>`;
  }

  h += `</div>
    <div class="idx-meta">`;
  const metaKeys = [['关键点位-支撑','支撑位'],['关键点位-压力','压力位'],['量能情况','量能'],['近期指数预期（1～2日）','近期预期']];
  for (const [rawKey, label] of metaKeys) {
    const val = idx[rawKey] || idx[rawKey.replace('-','-').replace(/[（）]/g,'')] || idx[Object.keys(idx).find(k=>k.includes(label.slice(0,2)))||''] || '—';
    h += `<div class="idx-meta-item"><div class="idx-meta-k">${label}</div><div class="idx-meta-v">${val}</div></div>`;
  }
  h += `</div></div>`;   // /idx-card

  // 情绪统计卡
  const emo = r.emo || {};
  const ztNum  = parseInt(emo['涨停家数']||0);
  const dtNum  = parseInt(emo['跌停家数']||0);
  const redNum = parseInt((emo['红盘数']||'').replace(/[^\d]/g,'')||0);
  const greNum = parseInt((emo['绿盘数']||'').replace(/[^\d]/g,'')||0);
  const node   = emo['情绪节点（启动/发酵/高潮/分歧/分化/退潮/混沌）'] || emo['情绪节点'] || '—';
  const combo  = emo['指数与情绪组合（共振走强/背离/割裂）'] || emo['指数与情绪组合'] || '—';

  h += `<div class="card" style="display:flex;flex-direction:column;">
    <div class="card-head">
      <span class="card-head-badge">情绪</span>
      <span class="card-head-title">情绪复盘</span>
      <span class="head-spacer"></span>
      <span style="font-size:11px;color:var(--text2);">${node}</span>
    </div>
    <div class="emo-grid">
      <div class="emo-item"><div class="emo-val green">${ztNum}</div><div class="emo-lbl">涨停</div></div>
      <div class="emo-item"><div class="emo-val red">${dtNum}</div><div class="emo-lbl">跌停</div></div>
      <div class="emo-item"><div class="emo-val cyan">${redNum}</div><div class="emo-lbl">红盘</div></div>
      <div class="emo-item"><div class="emo-val amber">${greNum}</div><div class="emo-lbl">绿盘</div></div>
    </div>
    <div style="padding:8px 16px 12px;display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:11px;color:var(--text2)">多头风标：<span style="color:var(--green)">${emo['多头风标1']||emo['多头风标 1']||'—'}</span>　<span style="color:var(--green)">${emo['多头风标2']||emo['多头风标 2']||''}</span></div>
      <div style="font-size:11px;color:var(--text2)">空头风标：<span style="color:var(--red)">${emo['空头风标1']||emo['空头风标 1']||'—'}</span></div>
      <div style="font-size:11px;color:var(--text2)">指数情绪：<span style="color:var(--amber)">${combo}</span></div>
    </div>
    <div class="chart-wrap" style="padding:0 16px 14px;"><canvas id="chart-ztdt"></canvas></div>
  </div>`;
  h += '</div>'; // /row2

  // ── 行2：情绪日历
  const cal = r.cal || [];
  if (cal.length) {
    h += `<div class="card" style="margin-bottom:14px;">
      <div class="card-head"><span class="card-head-badge">日历</span><span class="card-head-title">情绪日历（近5日）</span></div>
      <div class="cal-row">`;
    for (const c of cal) {
      const isToday = c.date === (r.review_date || r.date);
      const trendMap = {'↑':'📈','↓':'📉','→':'➡'};
      const stateColor = c.state.includes('高潮')?'var(--amber)':c.state.includes('发酵')?'var(--green)':c.state.includes('退潮')||c.state.includes('分化')?'var(--red)':'var(--text)';
      h += `<div class="cal-item${isToday?' today':''}">
        <div class="cal-date">${c.date}</div>
        <div class="cal-state" style="color:${stateColor}">${c.state}</div>
        <div class="cal-desc">${c.desc}</div>
        <div class="cal-trend">${trendMap[c.trend]||c.trend}</div>
      </div>`;
    }
    h += `</div>
      <div class="chart-wrap"><canvas id="chart-cal"></canvas></div>
    </div>`;
  }

  // ── 行3：板块复盘 + 热力追踪
  h += '<div class="row2" style="margin-bottom:14px;">';

  // 板块复盘表
  const sectors = r.sectors || [];
  h += `<div class="card">
    <div class="card-head"><span class="card-head-badge">板块</span><span class="card-head-title">板块与题材复盘</span></div>
    <div style="overflow-x:auto">
    <table class="sector-table">
      <tr><th>题材</th><th>龙一</th><th>阶段</th><th>封单</th><th>明日预期</th></tr>`;
  for (const s of sectors.slice(0, 10)) {
    const stageCls = s.stage.includes('发酵')?'pill-ferment':s.stage.includes('高潮')?'pill-peak':s.stage.includes('退潮')||s.stage.includes('分化')?'pill-decay':'pill-other';
    // 提取龙一名字（去掉括号内容）
    const d1Name = s.dragon1.replace(/\(.*?\)/g,'').trim();
    h += `<tr>
      <td style="font-weight:700">${s.name}</td>
      <td style="color:var(--text2)">${d1Name}</td>
      <td><span class="stage-pill ${stageCls}">${s.stage}</span></td>
      <td style="color:var(--amber);font-family:'JetBrains Mono',monospace;font-size:11px">${s.seal}</td>
      <td style="color:var(--blue);font-size:11px">${s.expect}</td>
    </tr>`;
  }
  h += `</table></div></div>`;

  // 热力追踪
  const heat = r.heat || {};
  const active  = heat.active  || [];
  const cooling = heat.cooling || [];
  const allHeat = [...active, ...cooling.slice(0,5)];
  const maxHeat = Math.max(...allHeat.map(x=>x.today||0), 1);

  h += `<div class="card">
    <div class="card-head"><span class="card-head-badge">热力</span><span class="card-head-title">近5日题材热力</span></div>
    <div class="heat-list">`;
  for (const item of active.concat(cooling.slice(0,5))) {
    const barPct = Math.round((item.today/maxHeat)*100);
    const isActive = active.includes(item);
    const barColor = item.trend==='↑'?'var(--green)':item.trend==='↓'?'var(--red)':'var(--amber)';
    const stageTag = item.stage.includes('发酵')?`<span class="heat-stage stage-active">📈发酵</span>`:item.stage.includes('退潮')||item.stage.includes('低吸')?`<span class="heat-stage stage-low">✅低吸</span>`:`<span class="heat-stage stage-cooling">⚠退潮</span>`;
    h += `<div class="heat-row">
      <span class="heat-name">${item.name}</span>
      <div class="heat-bar-wrap"><div class="heat-bar" style="width:${barPct}%;background:${barColor}"></div></div>
      <span class="heat-num" style="color:${barColor}">${item.today||0}</span>
      <span class="heat-trend">${item.trend==='↑'?'📈':item.trend==='↓'?'📉':'➡'}</span>
      ${stageTag}
    </div>`;
  }
  h += `</div></div>`;
  h += '</div>'; // /row2

  // ── 行4：如果则执行 + 四块打分
  h += '<div class="row2" style="margin-bottom:14px;">';

  // 如果则执行
  const its = r.ifThen || [];
  h += `<div class="card">
    <div class="card-head"><span class="card-head-badge">执行</span><span class="card-head-title">如果则执行（触发清单）</span></div>`;
  if (its.length) {
    h += `<div class="ifthen-head"><span>条件</span><span>执行动作</span><span>结果/备注</span></div>
    <div class="ifthen-list">`;
    for (const it of its.slice(0,12)) {
      h += `<div class="ifthen-row">
        <div class="ifthen-cond">${it.cond}</div>
        <div class="ifthen-action">${it.action}</div>
        <div class="ifthen-result">${it.result}</div>
      </div>`;
    }
    h += '</div>';
  } else {
    h += `<div style="padding:20px 16px;color:var(--muted);font-size:12px">暂无如果则执行数据</div>`;
  }
  h += '</div>';

  // 四块打分
  const sc = r.score || {};
  const total = sc.total || '—';
  const scoreColor = typeof total==='number' ? (total>=7?'var(--green)':total>=5?'var(--amber)':'var(--red)') : 'var(--muted)';
  const summary = r.summary || '';

  h += `<div class="card" style="display:flex;flex-direction:column;gap:0">
    <div class="card-head"><span class="card-head-badge">打分</span><span class="card-head-title">四块拼图打分</span></div>
    <div class="score-wrap">
      <div class="score-total"><div class="score-total-num" style="color:${scoreColor}">${total}</div><div class="score-total-lbl">/ 10</div></div>
      <div class="score-sub-grid">`;
  const subScores = Object.entries(sc).filter(([k])=>k!=='total').slice(0,4);
  const scoreColors2 = ['var(--green)','var(--blue)','var(--amber)','var(--violet)'];
  subScores.forEach(([k,v],i)=>{
    const pct = Math.min(100, Math.round((v/10)*100));
    h += `<div class="score-sub-item">
      <div class="score-sub-k">${k}</div>
      <div class="score-sub-bar"><div class="score-sub-fill" style="width:${pct}%;background:${scoreColors2[i%4]}"></div></div>
      <div class="score-sub-v" style="color:${scoreColors2[i%4]}">${v}</div>
    </div>`;
  });
  if (!subScores.length) {
    for (let i=0;i<4;i++) h+=`<div class="score-sub-item"><div class="score-sub-k">维度${i+1}</div><div class="score-sub-v" style="color:var(--muted)">—</div></div>`;
  }
  h += `</div></div>`;
  if (summary) {
    h += `<div style="padding:10px 18px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.7">
      <span style="color:var(--muted);font-size:10px;margin-right:6px">总结</span>${summary}
    </div>`;
  }
  h += '</div>';
  h += '</div>'; // /row2

  return h;
}

// 重建 Chart.js 图表
function rebuildCharts() {
  // 涨停/跌停柱图
  const ztCtx = document.getElementById('chart-ztdt');
  if (ztCtx) {
    if (auctionChart) { auctionChart.destroy(); auctionChart = null; }
    // 读当前复盘情绪日历数据
    const calData = (() => {
      try {
        const panel = document.getElementById('review-content');
        const calItems = panel.querySelectorAll('.cal-item');
        if (!calItems.length) return null;
        return null; // 用全局缓存的 d
      } catch(_){ return null; }
    })();

    // 简单柱图：涨停 vs 跌停
    const revDate = Object.keys(reviewCache)[0];
    const lastReview = revDate ? null : null;
    auctionChart = new Chart(ztCtx, {
      type: 'bar',
      data: {
        labels: ['涨停','跌停','红盘','绿盘'],

            parseInt(ztCtx.closest('.card')?.querySelector('.emo-val.cyan')?.textContent||0),
            parseInt(ztCtx.closest('.card')?.querySelector('.emo-val.amber')?.textContent||0),
          ],
          backgroundColor: ['rgba(31,217,126,0.5)','rgba(240,82,82,0.5)','rgba(34,211,238,0.35)','rgba(245,166,35,0.35)'],
          borderColor: ['#1fd97e','#f05252','#22d3ee','#f5a623'],

        }]

        scales:{ x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b7280',font:{size:10}}}, y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b7280',font:{size:10}}} }
      }
    });
  }

  // 情绪日历折线图（涨停数）
  const calCtx = document.getElementById('chart-cal');
  if (calCtx) {

      const dt = ci.querySelector('.cal-date')?.textContent || '';

    calChart = new Chart(calCtx, {
      type: 'line',
      data: {
        labels,
        datasets: [{

      }
    });

}

// Tab2: 预案渲染
// ══════════════════════════════════════════════════════════════════
async function loadPlan(date) {
  const el = document.getElementById('plan-content');
  if (planCache[date]) { el.innerHTML = planCache[date]; return; }
  el.innerHTML = '<div class="state-msg"><span class="icon">🎯</span>加载预案中…</div>';
  try {
    const r = await fetch(`/api/speedcard?date=${date}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const html = buildPlanHtml(d);
    el.innerHTML = html;
    planCache[date] = html;
  } catch(e) {
    el.innerHTML = `<div class="state-msg"><span class="icon">⚠</span>加载失败：${e.message}</div>`;
  }
}

function buildPlanHtml(d) {
  let h = '';

  // ── 顶部元信息横条
  const scoreColor = d.score ? (d.score>=7?'var(--green)':d.score>=5?'var(--amber)':'var(--red)') : 'var(--muted)';
  h += `<div class="idx-card" style="margin-bottom:14px;flex-wrap:wrap;gap:16px;align-items:center;">
    <div>
      <div style="font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-bottom:4px">📋 预案日期</div>
      <div style="font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace">${d.date||'—'}</div>
    </div>
    <div style="width:1px;height:36px;background:var(--border2)"></div>
    <div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:3px">仓位天花板</div>
      <div style="font-size:15px;font-weight:700;color:var(--amber)">${d.cap||'—'}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:3px">情绪定性</div>
      <div style="font-size:13px;font-weight:600;color:var(--text)">${d.emotion||'—'}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:3px">四块拼图</div>
      <div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${scoreColor}">${d.score||'—'}<span style="font-size:11px;color:var(--muted)">/10</span></div>
    </div>
  </div>`;

  // ── 第零步信号表
  const step0 = d.step0 || [];
  h += `<div class="card" style="margin-bottom:14px;">
    <div class="card-head"><span class="card-head-badge">第零步</span><span class="card-head-title">主线存活判断（9:15先做）</span>
      <span class="head-spacer"></span>
      <span style="font-size:11px;color:var(--muted)">全✅走A　≥2✗走B　模糊不操作</span>
    </div>
    <table class="step0-table">
      <tr><th>信号</th><th>✅ 延续（A模式）</th><th>❌ 退潮/切换（B模式）</th></tr>`;
  for (const s of step0) {
    h += `<tr>
      <td class="step0-signal">${s.signal}</td>
      <td class="step0-ok">${s.ok}</td>
      <td class="step0-fail">${s.fail}</td>
    </tr>`;
  }
  if (!step0.length) h += `<tr><td colspan="3" style="color:var(--muted);padding:16px">暂无解析到第零步信号</td></tr>`;
  h += `</table></div>`;

  // ── 第一优先 + 第二优先
  h += '<div class="row2" style="margin-bottom:14px;">';
  h += buildPlanChainHtml(d.p1, '① 第一优先', 'card-blue');
  h += buildPlanChainHtml(d.p2, '② 第二优先', 'card-violet');
  h += '</div>';

  // ── B模式候选
  const bCands = d.bCandidates || [];
  if (bCands.length) {
    h += `<div class="card" style="margin-bottom:14px;">
      <div class="card-head"><span class="card-head-badge">B模式</span><span class="card-head-title">备用主线候选（第零步判定切换时看这里）</span></div>
      <div class="plan-b-grid" style="padding:14px;gap:12px;">`;
    for (const bc of bCands) {
      h += `<div class="plan-b-card">
        <div class="plan-b-head">${bc.title}</div>`;
      if (bc.switchText) {
        h += `<div class="plan-b-switch">${bc.switchText.replace(/\n+/g,'\n').slice(0,300)}</div>`;
      }
      for (const s of (bc.stocks||[]).slice(0,5)) {
        h += `<div class="plan-stock-row" style="grid-template-columns:120px 1fr;padding:6px 14px;">
          <div class="plan-stock-name"><span>${s.name}</span><span class="plan-stock-role" style="font-size:9.5px;color:var(--muted)">${s.ts_code}</span></div>
          <div style="font-size:11px;color:var(--text2)">第${s.rank}位</div>
        </div>`;
      }
      h += `</div>`;
    }
    h += `</div></div>`;
  }

  // ── 空仓条件
  const noTrade = d.noTrade || [];
  if (noTrade.length) {
    h += `<div class="card" style="margin-bottom:14px;">
      <div class="card-head"><span class="card-head-badge" style="background:var(--red-bg);color:var(--red);border-color:var(--red-bd)">🚫</span><span class="card-head-title" style="color:var(--red)">今日不操作条件</span></div>
      <div class="no-trade-list">`;
    for (const nt of noTrade) {
      h += `<div class="no-trade-item"><span class="no-trade-icon">🛑</span><span>${nt}</span></div>`;
    }
    h += `</div></div>`;
  }

  // ── 如果则执行（速查版）
  const its = d.ifThen || [];
  if (its.length) {
    h += `<div class="card" style="margin-bottom:14px;">
      <div class="card-head"><span class="card-head-badge">执行</span><span class="card-head-title">如果则执行（速查）</span></div>
      <div class="ifthen-head"><span>条件</span><span>执行动作</span><span>结果/备注</span></div>
      <div class="ifthen-list">`;
    for (const it of its.slice(0,12)) {
      h += `<div class="ifthen-row">
        <div class="ifthen-cond">${it.cond}</div>
        <div class="ifthen-action">${it.action}</div>
        <div class="ifthen-result">${it.result}</div>
      </div>`;
    }
    h += `</div></div>`;
  }

  return h;
}

function buildPlanChainHtml(chain, label, cardCls) {
  if (!chain) return `<div class="card ${cardCls}"><div class="card-head"><span class="card-head-title">${label}</span></div><div style="padding:20px;color:var(--muted)">暂无数据</div></div>`;
  const { title, stocks, health } = chain;
  let h = `<div class="card ${cardCls}">
    <div class="card-head">
      <span class="card-head-badge">${label}</span>
      <span class="card-head-title">${title||label}</span>
    </div>`;
  // 健康度条件
  if (health && health.length) {
    h += `<div class="health-row">`;
    for (const hc of health) {
      h += `<span class="hc-item hc-nd" title="${hc.name} 竞价>  ${hc.threshold}%">？ ${hc.name} >${hc.threshold}%</span>`;
    }
    h += `</div>`;
  }
  // 股票行
  for (const s of (stocks||[])) {
    h += `<div class="plan-stock-row">
      <div class="plan-stock-name">
        <span>${s.name}</span>
        <span class="plan-stock-role">${s.role}</span>
      </div>
      <div class="plan-stock-cond">${s.cond}</div>
      <div class="plan-stock-deny" style="font-size:10.5px">${s.deny?'✗ '+s.deny:''}</div>
    </div>`;
  }
  h += `</div>`;
  return h;
}

// Tab3: 竞价监控（原有逻辑）
// ══════════════════════════════════════════════════════════════════
const sbClass = t => ({'sealed':'sbadge-sealed','ok':'sbadge-ok','watch':'sbadge-watch','drop':'sbadge-drop','nodata':'sbadge-nodata'}[t]||'sbadge-nodata');
const pcClass = t => ({'sealed':'pct-sealed','ok':'pct-ok','watch':'pct-watch','drop':'pct-drop','nodata':'pct-nodata'}[t]||'pct-nodata');

function aucHtml(s) {
  const ratioPart = (s.auc_ratio != null && !isNaN(s.auc_ratio))
    ? ` <span class="abadge-ratio" title="今竞价÷昨竞价（昨竞价来自速查附录表，即生成速查当日）">比${Number(s.auc_ratio).toFixed(2)}×</span>`
    : '';
  if (!s.has_auc) {
    if (s.prev_auc_bn != null && s.prev_auc_bn > 0) {
      return `<span class="abadge abadge-prevonly" title="速查附录：生成速查当日竞价额(亿)，9:25 后显示竞价比">昨${Number(s.prev_auc_bn).toFixed(2)}亿</span>`;
    }
    return '<span class="abadge abadge-none">—</span>';
  }
  const a = s.auc_amt!==null?s.auc_amt.toFixed(2):'?';
  const thr = s.amt_thr!==null?`≥${s.amt_thr.toFixed(2)}`:'';
  if (s.auc_ok===true)  return `<span class="abadge abadge-ok">竞价 ${a}亿${ratioPart} ✓</span>`;
  if (s.auc_ok===false) return `<span class="abadge abadge-fail">竞价 ${a}亿${ratioPart} ✗ (${thr})</span>`;
  return `<span class="abadge abadge-neu">竞价 ${a}亿${ratioPart}</span>`;
}

function stockRowHtml(s, small) {
  return `<div class="${small?'srow srow-sm':'srow'}">
    <span class="${small?'s-label s-label-sm':'s-label'}" title="${s.ts_code}">${s.label}</span>
    <span class="s-pct ${pcClass(s.status_type)}">${s.pct_str}</span>
    <span class="sbadge ${sbClass(s.status_type)}">${s.status_text}</span>
    ${aucHtml(s)}
  </div>`;
}

function healthCardClass(h) {
  if (!h||!h.checks||!h.checks.length) return '';
  if (h.passed) return 'health-pass';
  if (h.ok_count>0) return 'health-warn';
  return 'health-fail';
}
function healthBadgeHtml(h) {
  if (!h||!h.checks||!h.checks.length) return '';
  const ok=h.ok_count||0,tot=h.checks.length,req=h.required||2;
  let cls,icon;
  if (h.passed){cls='hbadge-pass';icon='✓';}
  else if(ok>0){cls='hbadge-warn';icon='⚠';}
  else{cls='hbadge-fail';icon='✗';}
  return `<span class="hbadge ${cls}" title="${h.passed?'健康度达标':'需满足'+req+'条，当前'+ok+'条'}">${icon} 健康度 ${ok}/${tot}</span>`;
}
function healthRowHtml(h) {
  if (!h||!h.checks||!h.checks.length) return '';
  const items=h.checks.map(c=>{
    let cls,icon;
    if(c.pct===null){cls='hc-nd';icon='?';}
    else if(c.pass){cls='hc-pass';icon='✓';}
    else{cls='hc-fail';icon='✗';}
    return `<span class="hc-item ${cls}" title="${c.name} ${c.thr_str}">${icon} ${c.name} ${c.pct_str}</span>`;
  }).join('');
  return `<div class="health-row">${items}</div>`;
}
function switchBadgeHtml(sw) {
  if (!sw) return '';
  const cls=sw.pool_ok?'hbadge-pass':'hbadge-fail';
  const icon=sw.pool_ok?'✓':'✗';
  return `<span class="hbadge ${cls}">${icon} 池 ${sw.pool_detail||''}</span>`;
}
function switchRowHtml(sw) {
  if (!sw||!sw.checks) return '';
  const items=sw.checks.map(c=>{
    let cls;
    if(!c.auto)cls='sw-man';
    else if(c.pass)cls='sw-pass';
    else cls='sw-fail';
    const icon=!c.auto?'人工':(c.pass?'✓':'✗');
    return `<span class="sw-item ${cls}">${icon} ${c.desc}</span>`;
  }).join('');
  return `<div class="b-switch-row">${items}</div>`;
}

function renderAuction(d) {
  // 顶栏
  document.getElementById('hdr-time').textContent = d.tick_time||'--:--';
  const shEl=document.getElementById('hdr-sh');
  shEl.textContent=d.sh_price_str||'—';
  shEl.className=`auction-idx-val ${d.sh_ok?'':''}`;
  shEl.style.color = d.sh_ok?'var(--green)':'var(--red)';
  const ksEl=document.getElementById('hdr-ks');
  ksEl.textContent=d.key_support?d.key_support.toFixed(2):'—';
  ksEl.style.color = d.sh_ok?'var(--green)':'var(--red)';

  let h='';
  // Row1: P1 + P2
  h+='<div class="row2">';
  const p1hc=healthCardClass(d.p1_health);
  h+=`<div class="card ${p1hc}"><div class="card-head"><span class="card-head-badge">① 第一优先</span><span class="card-head-title">${d.p1_title||''}</span><span class="head-spacer"></span>${healthBadgeHtml(d.p1_health)}</div>${healthRowHtml(d.p1_health)}`;
  for(const s of (d.p1||[])) h+=stockRowHtml(s,false);
  h+='</div>';
  const p2hc=healthCardClass(d.p2_health);
  h+=`<div class="card ${p2hc}"><div class="card-head"><span class="card-head-badge">② 第二优先</span><span class="card-head-title">${d.p2_title||''}</span><span class="head-spacer"></span>${healthBadgeHtml(d.p2_health)}</div>${healthRowHtml(d.p2_health)}`;
  for(const s of (d.p2||[])) h+=stockRowHtml(s,false);
  h+='</div>';
  h+='</div>';

  // B 备选
  if(d.b_candidates&&d.b_candidates.length){
    h+=`<div class="card" style="margin-top:14px"><div class="card-head"><span class="card-head-badge">B 备选</span><span class="card-head-title">切换候选（主线退潮时看这里）</span></div><div class="b-grid">`;
    for(const bc of d.b_candidates){
      const sw=bc.switch_eval;
      h+=`<div class="b-sub"><div class="b-sub-head"><span>${bc.title}</span>${switchBadgeHtml(sw)}</div>${switchRowHtml(sw)}`;
      for(const s of (bc.stocks||[])) h+=stockRowHtml(s,true);
      h+='</div>';
    }
    h+='</div></div>';
  }

  // 低吸候选
  if(d.watch_packages&&d.watch_packages.length){
    h+=`<div class="card" style="margin-top:14px"><div class="card-head"><span class="card-head-badge">低吸候选</span><span class="card-head-title">盘中观察池</span></div><div class="w-grid">`;
    for(const wp of d.watch_packages){
      h+=`<div class="w-sub"><div class="w-sub-head">${wp.title}</div>`;
      for(const s of (wp.stocks||[])) h+=stockRowHtml(s,true);
      h+='</div>';
    }
    h+='</div></div>';
  }

  document.getElementById('auction-main').innerHTML=h;
  document.getElementById('f-updated').textContent=`更新于 ${d.updated_at||'--'}`;
}

// ══════════════════════════════════════════════════════════════════
// 竞价 Tab：按日期切换「实时」与「该日最后一轮快照」
// ══════════════════════════════════════════════════════════════════
function disconnectSSE() {
  if (evtSource) {
    try { evtSource.close(); } catch (_) {}
    evtSource = null;
  }
  useSSE = false;
}

async function loadAuctionSnapshot(date) {
  const ds = date.replace(/-/g, '');
  document.getElementById('auction-main').innerHTML =
    '<div class="state-msg"><span class="icon">⏳</span>加载该日竞价快照…</div>';
  try {
    const r = await fetch(`/api/snapshot?date=${ds}`);
    const d = await r.json();
    if (!r.ok || d.error) {
      document.getElementById('auction-main').innerHTML =
        `<div class="state-msg"><span class="icon">⚠</span>${d.error || '加载失败'}<div class="hint">${d.detail || ''}</div></div>`;
      setLiveState('error');
      document.getElementById('f-updated').textContent = '—';
      return;
    }
    renderAuction(d);
    document.getElementById('f-updated').textContent =
      `快照 ${d.updated_at || '—'} · ${date}（该日最后一轮写入 outputs/cache）`;
  } catch (e) {
    document.getElementById('auction-main').innerHTML =
      `<div class="state-msg"><span class="icon">⚠</span>请求失败：${e.message}</div>`;
    setLiveState('error');
  }
}

function enterHistoricalAuctionMode(date) {
  auctionHistorical = true;
  lastReceivedAt = null;
  lastUpdatedAt = null;
  lastPushId = null;
  disconnectSSE();
  document.getElementById('f-mode').textContent = '历史快照';
  document.getElementById('countdown-wrap').classList.remove('show');
  document.getElementById('f-stale').textContent = '';
  document.getElementById('live-age').textContent = '';
  setLiveState('historical');
  loadAuctionSnapshot(date);
}

function enterLiveAuctionMode() {
  auctionHistorical = false;
  lastReceivedAt = null;
  cdVal = POLL_INTERVAL;
  document.getElementById('f-mode').textContent = '连接中…';
  disconnectSSE();
  connectSSE();
  setTimeout(() => { if (!lastUpdatedAt && !auctionHistorical) fetchData(true); }, 500);
  setTimeout(() => { if (!lastUpdatedAt && !auctionHistorical) fetchData(true); }, 2000);
  setTimeout(() => { if (!lastUpdatedAt && !auctionHistorical) fetchData(true); }, 5000);
}

function syncAuctionViewForDate(date) {
  const today = localTodayStr();
  if (date === today) enterLiveAuctionMode();
  else enterHistoricalAuctionMode(date);
}

// ══════════════════════════════════════════════════════════════════
// SSE / 轮询（竞价 Tab 专用）
// ══════════════════════════════════════════════════════════════════
let lastUpdatedAt=null,lastPushId=null,lastReceivedAt=null,staleSec=0;
let evtSource=null,useSSE=false;
const POLL_INTERVAL=10,STALE_WARN=90;
let cdVal=POLL_INTERVAL,polling=false;

function setLiveState(state){
  const dot=document.getElementById('live-dot'),label=document.getElementById('live-label');
  dot.className=`live-dot ${state==='connecting'?'':state}`;
  label.className=`live-label ${state==='connecting'?'':state}`;
  const map={live:'LIVE',stale:'延迟',error:'断线',connecting:'连接中…',historical:'历史快照'};
  label.textContent=map[state]||state;
}
function flashUpdate(){
  const main=document.getElementById('auction-main');
  main.classList.remove('flash-anim');
  void main.offsetWidth;
  main.classList.add('flash-anim');
}
function handleData(d){
  if (auctionHistorical) return;
  lastReceivedAt=Date.now();
  if(d.error){
    document.getElementById('auction-main').innerHTML=`<div class="state-msg"><span class="icon">⏳</span>${d.error}<div class="hint">${d.detail||''}</div></div>`;
    setLiveState('error');return;
  }
  const pid=d.push_id;
  const isNew=(pid!=null&&pid!==lastPushId)||(pid==null&&d.updated_at!==lastUpdatedAt);
  if(isNew){renderAuction(d);flashUpdate();lastUpdatedAt=d.updated_at;if(pid!=null)lastPushId=pid;staleSec=0;setLiveState('live');}
  document.getElementById('f-updated').textContent=`更新于 ${d.updated_at||'--'}`;
  document.getElementById('live-age').textContent='';
}
function connectSSE(){
  if (auctionHistorical) return;
  disconnectSSE();
  setLiveState('connecting');
  evtSource=new EventSource('/api/stream');
  evtSource.onopen=()=>{if(auctionHistorical)return;useSSE=true;document.getElementById('f-mode').textContent='SSE 实时流';document.getElementById('countdown-wrap').classList.remove('show');};
  evtSource.onmessage=(e)=>{try{handleData(JSON.parse(e.data));}catch(_){}};
  evtSource.onerror=()=>{useSSE=false;try{evtSource&&evtSource.close();}catch(_){}evtSource=null;setLiveState('error');document.getElementById('f-mode').textContent='轮询降级';document.getElementById('countdown-wrap').classList.add('show');if(auctionHistorical)return;setTimeout(()=>{if(!auctionHistorical)connectSSE();},10000);};
}
function fetchData(force){
  if (auctionHistorical) return;
  if(!force&&polling)return;
  polling=true;
  fetch('/api/data?_='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(d=>handleData(d)).catch(e=>{
    document.getElementById('auction-main').innerHTML=`<div class="state-msg"><span class="icon">⚠</span>连接失败: ${e.message}</div>`;
    setLiveState('error');
  }).finally(()=>{polling=false;});
}

setInterval(()=>{
  if(!auctionHistorical&&lastReceivedAt){
    const age=Math.round((Date.now()-lastReceivedAt)/1000);
    const ageEl=document.getElementById('live-age');
    if(age>=STALE_WARN){setLiveState('stale');ageEl.textContent=`${age}s前`;document.getElementById('f-stale').textContent=`⚠ 已${age}s未更新`;document.getElementById('f-stale').style.color='var(--amber)';}
    else{if(useSSE&&evtSource&&evtSource.readyState===1)setLiveState('live');ageEl.textContent=age>5?`${age}s前`:'';document.getElementById('f-stale').textContent='';}
  }
  // 与 SSE 并行：即使 EventSource 已连接也定时拉 REST，避免 Linux 下文件监听漏推导致界面停更
  if(auctionHistorical)return;
  cdVal--;
  const el=document.getElementById('countdown');
  if(el){el.textContent=cdVal;el.className=`countdown-num${cdVal<=5?' cd-low':''}`;}
  if(cdVal<=0){fetchData(true);cdVal=POLL_INTERVAL;}
},1000);

// ══════════════════════════════════════════════════════════════════
// 启动
// ══════════════════════════════════════════════════════════════════
loadDates().then(()=>{
  // 默认激活竞价 Tab：所选日期 = 本地今日则拉实时流，否则只显示该日 dashboard_YYYYMMDD.json
  if (currentDate) syncAuctionViewForDate(currentDate);
});
</script>
</body>
</html>
