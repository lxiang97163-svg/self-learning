<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拾光 · 把照片变成故事</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 背景装饰 -->
  <div class="bg-blob blob-1" aria-hidden="true"></div>
  <div class="bg-blob blob-2" aria-hidden="true"></div>
  <div class="bg-blob blob-3" aria-hidden="true"></div>

  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <span class="logo-deco deco-l">✦</span>
        <h1 class="logo">拾光</h1>
        <span class="logo-deco deco-r">✦</span>
      </div>
      <p class="tagline">把你的照片，变成只属于你的故事</p>
    </header>

    <main class="main">

      <!-- 上传区域 -->
      <section class="card upload-card" id="uploadCard">
        <div class="upload-zone" id="uploadZone" tabindex="0" role="button" aria-label="上传照片">
          <div class="upload-icon">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="4"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
          </div>
          <p class="upload-title">点击上传照片</p>
          <p class="upload-hint">或将照片拖拽至此 &nbsp;·&nbsp; 最多 20 张 &nbsp;·&nbsp; JPG PNG WEBP</p>
          <div class="upload-sparkles" aria-hidden="true">
            <span class="sp sp1">✧</span>
            <span class="sp sp2">✦</span>
            <span class="sp sp3">✧</span>
            <span class="sp sp4">✦</span>
          </div>
          <input type="file" id="fileInput" multiple accept="image/*" hidden />
        </div>
      </section>

      <!-- 照片网格 -->
      <section class="card photos-card" id="photosCard" hidden>
        <div class="section-header">
          <h2 class="section-title">你的照片</h2>
          <button class="link-btn" id="addMoreBtn">＋ 继续添加</button>
          <input type="file" id="addMoreInput" multiple accept="image/*" hidden />
        </div>
        <p class="section-hint">为每张照片添加备注可以让生成更准确，不填也完全 OK ✌️</p>
        <div class="photo-grid" id="photoGrid"></div>
      </section>

      <!-- 文风 + 生成 -->
      <section class="card controls-card" id="controlsCard" hidden>
        <h2 class="section-title">选择文风</h2>
        <div class="style-selector" id="styleSelector">
          <button class="style-btn active" data-style="healing">
            <span class="style-emoji">🌿</span>
            <span class="style-name">治愈风</span>
            <span class="style-desc">温暖细腻</span>
          </button>
          <button class="style-btn" data-style="literary">
            <span class="style-emoji">🌸</span>
            <span class="style-name">文艺风</span>
            <span class="style-desc">诗意留白</span>
          </button>
          <button class="style-btn" data-style="humorous">
            <span class="style-emoji">✨</span>
            <span class="style-name">幽默风</span>
            <span class="style-desc">轻松有趣</span>
          </button>
          <button class="style-btn" data-style="custom">
            <span class="style-emoji">✍️</span>
            <span class="style-name">我的文风</span>
            <span class="style-desc">专属定制</span>
          </button>
        </div>

        <!-- 自定义文风输入（折叠） -->
        <div class="custom-wrap" id="customWrap">
          <div class="custom-inner">
            <div class="custom-header">
              <span class="custom-label">粘贴一段你写过的文字，AI 来学你的风格</span>
              <span class="char-counter" id="charCounter">0 / 500</span>
            </div>
            <textarea
              id="customSample"
              class="custom-textarea"
              placeholder="朋友圈文案、日记片段、随笔……都可以，越真实越好 🌱"
              maxlength="500"
              rows="5"
            ></textarea>
          </div>
        </div>

        <button class="generate-btn" id="generateBtn">
          <span class="btn-text">生成我的故事</span>
          <span class="btn-loading" hidden>
            <span class="dot-pulse"><i></i><i></i><i></i></span>
            <span>生成中…</span>
          </span>
        </button>
      </section>

      <!-- 结果 -->
      <section class="card result-card" id="resultCard" hidden>
        <div class="result-header">
          <h2 class="section-title">你的故事</h2>
          <span class="result-tag" id="resultStyleTag"></span>
        </div>
        <div class="result-body" id="resultText"></div>
        <div class="result-actions">
          <button class="btn-ghost" id="copyBtn">
            <span class="copy-icon">⎘</span> 复制文字
          </button>
          <button class="btn-ghost" id="regenerateBtn">↻ 重新生成</button>
          <button class="btn-solid" id="resetBtn">开始新的 →</button>
        </div>
      </section>

    </main>

    <footer class="footer">
      拾光 · MVP 内测版 · 照片仅用于生成，不做存储
    </footer>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
